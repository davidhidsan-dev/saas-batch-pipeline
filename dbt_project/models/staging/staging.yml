version: 2

sources:
  - name: saas_raw
    database: datasets-490115
    schema: saas_raw
    tables:
      - name: users
        description: Raw users table generated in Python and loaded into BigQuery.
      - name: subscriptions
        description: Raw subscriptions table generated in Python and loaded into BigQuery.
      - name: events
        description: Raw events table generated in Python and loaded into BigQuery.

models:
  - name: stg_users
    description: Cleaned and standardized users model built from the raw users source.
    columns:
      - name: user_id
        description: Unique user identifier.
        tests:
          - not_null
          - unique

  - name: stg_subscriptions
    columns:
      - name: subscription_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id

  - name: stg_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id