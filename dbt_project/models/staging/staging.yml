version: 2

sources:
  - name: saas_raw
    database: datasets-490115
    schema: saas_raw
    tables:
      - name: users
      - name: subscriptions
      - name: events

models:
  - name: stg_users
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

  - name: stg_subscriptions
    columns:
      - name: subscription_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id

  - name: stg_events
    columns:
      - name: event_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id