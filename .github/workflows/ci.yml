name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify project imports
        run: |
          python -c "from src.generate.users_generator import generate_users"
          python -c "from src.generate.subscriptions_generator import generate_subscriptions"
          python -c "from src.generate.events_generator import generate_events"

      - name: Run synthetic generation smoke test
        run: |
          python -c "from src.generate.users_generator import generate_users; df = generate_users(10); print(len(df))"