name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify project imports
        run: |
          python -c "from src.generate.users_generator import generate_users; print('users import ok')"
          python -c "from src.generate.subscriptions_generator import generate_subscriptions; print('subscriptions import ok')"
          python -c "from src.generate.events_generator import generate_events; print('events import ok')"

      - name: Run synthetic generation smoke test
        run: |
          python -c "from src.generate.users_generator import generate_users; df = generate_users(10); assert len(df) == 10; print(df[['user_id', 'created_at']].head())"